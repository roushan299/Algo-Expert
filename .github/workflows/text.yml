name: "First CI pipeline"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      name:
        description: "Enter your name"
        required: true
        default: "User"


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Hello world"
        run: echo "Hello world"

      - name: Greet user
        run: echo "Hello ${{ github.event.inputs.name }}"